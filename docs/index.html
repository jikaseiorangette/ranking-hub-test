<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ボイスドラマ ランキングハブ［テスト］</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
    --ink:#26211f;--muted:#8a8077;--border:#e7e1d8;--border-light:#f0ebe3;
    --bg:#e9e2e6;--surface:#faf6f5;
    --plum-dark:#3c2440;--plum:#5a3157;--gold:#e3c081;--gold-muted:#c79a4a;
}
.site-garu{--accent-50:#fff1f4;--accent-100:#fde0e7;--accent-600:#d4386f;--accent-800:#8b1a42;--accent-muted:#b8829a;--accent-sub:#8b4f6a;}
.site-stella{--accent-50:#fdf6e3;--accent-100:#f9e7b8;--accent-600:#b8860b;--accent-800:#6b4e08;--accent-muted:#c9a86a;--accent-sub:#9a7209;}
.site-poke{--accent-50:#f0f4ff;--accent-100:#e0e9ff;--accent-600:#4361c2;--accent-800:#1e3a8a;--accent-muted:#8a9ad0;--accent-sub:#4a5fa8;}
.site-garucomm{--accent-50:#fef0f8;--accent-100:#fbd6ef;--accent-600:#c9439e;--accent-800:#821068;--accent-muted:#d880c0;--accent-sub:#a83090;}
.site-lovecul{--accent-50:#f0fff6;--accent-100:#d6f5e6;--accent-600:#2d8a5e;--accent-800:#1a5238;--accent-muted:#6abf95;--accent-sub:#1e6644;}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.hub-wrap{max-width:1200px;margin:0 auto;padding:32px 16px 60px}

/* アイコン切り替えバー */
.icon-switcher{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;font-size:11px;color:var(--muted)}
.icon-switcher button{padding:5px 14px;border-radius:20px;border:0.5px solid var(--border);background:#fff;font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;color:var(--muted);transition:all .15s}
.icon-switcher button.active{background:var(--plum-dark);color:var(--gold);border-color:var(--plum-dark)}

.hub-card{border-radius:18px;overflow:hidden;box-shadow:0 20px 50px rgba(60,36,64,.18);margin-bottom:24px}
.hub-header{background:linear-gradient(160deg,var(--plum-dark) 0%,var(--plum) 55%,var(--plum-dark) 100%);padding:32px 28px 26px;text-align:center}
.hub-gold-line{width:38px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto}
.hub-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:600;color:#f6ecf0;letter-spacing:.1em;line-height:1.4;margin:12px 0}
.hub-sub{font-size:12px;color:#d8b8d3;letter-spacing:.06em;font-family:'Noto Serif JP',serif}
.hub-update{display:inline-flex;gap:5px;align-items:center;font-size:10.5px;font-weight:600;color:var(--plum-dark);background:var(--gold);padding:5px 14px;border-radius:20px;margin-top:12px;white-space:nowrap}
.hub-tabs-bar{background:#fff;border-bottom:0.5px solid #c9b8d0;position:relative;}
.site-tabs{display:flex}
.site-tab{flex:1;text-align:center;padding:14px 2px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;color:#b39aae;border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:'Noto Sans JP',sans-serif;transition:color .15s}
.site-tab:hover{color:var(--plum)}
.site-tab.active{color:var(--plum-dark);background:#f0eaf5;border-radius:4px 4px 0 0;position:relative;z-index:1;outline:2.5px solid #e3c081;outline-offset:-1px;margin-bottom:-0.5px;}
.site-panel{display:none}
.site-panel.active{display:block}

/* 統計カード */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:6px}
.stat-value{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:500;color:var(--accent-800)}
.stat-sub{font-size:10px;color:var(--muted);margin-top:3px}

/* 3aアイコン：プラム円＋金ラインアイコン */
.icon-3a{width:16px;height:16px;border-radius:50%;background:var(--plum-dark);display:inline-flex;align-items:center;justify-content:center;flex:none;}
.icon-3a svg{width:9px;height:9px;}

/* 3cアイコン：円なし、金色ラインのみ */
.icon-3c{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex:none;}
.icon-3c svg{width:14px;height:14px;}

/* アイコンモード切り替え */
body.mode-none .icon-3a,body.mode-none .icon-3c{display:none}

.section{margin-bottom:28px}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.section-title{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:500;color:var(--accent-800)}
.section-badge{font-size:10px;background:var(--accent-100);color:var(--accent-600);border:0.5px solid var(--border);border-radius:20px;padding:2px 9px}
.section-badge-new{font-size:10px;background:#ecfdf5;color:#065f46;border:0.5px solid #6ee7b7;border-radius:20px;padding:2px 9px}
.table-card{background:#fff;border:0.5px solid var(--border);border-radius:16px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
thead th{background:#fafafa;color:var(--accent-800);font-weight:500;padding:10px 8px;border-bottom:0.5px solid var(--border-light);text-align:left;font-size:11px}
tbody td{padding:6px 8px;border-bottom:0.5px solid var(--border-light);vertical-align:top}
tbody td.thumb-wrap{vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--accent-50)}
.rb{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:500}
.r1{background:#fef3c7;color:#92400e;border:0.5px solid #fde68a}
.r2{background:#f1f5f9;color:#475569;border:0.5px solid #e2e8f0}
.r3{background:#fef0e6;color:#9a3412;border:0.5px solid #fed7aa}
.rn{background:var(--accent-50);color:var(--accent-muted);border:0.5px solid var(--border-light)}
.thumb-wrap{width:150px;min-width:150px;padding:4px 6px 4px 8px;position:relative}
.thumb-wrap img{width:146px;height:110px;object-fit:cover;border-radius:8px;border:0.5px solid var(--border-light);display:block}
.thumb-wrap a{display:block}
.thumb-rank{position:absolute;top:7px;left:11px;z-index:1}
.no-thumb{width:146px;height:110px;border-radius:8px;background:var(--accent-100);display:flex;align-items:center;justify-content:center;font-size:28px;border:0.5px solid var(--border-light)}
.title-cell{padding-left:8px !important}
.work-title{font-weight:500;color:var(--accent-800);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.work-title a{color:var(--accent-800);text-decoration:none}
.work-title a:hover{color:var(--accent-600);text-decoration:underline}
.work-circle{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.work-date{font-size:10px;color:var(--muted);margin-right:4px;white-space:nowrap}
.genres{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.gtag{display:inline-block;font-size:9px;background:var(--accent-50);color:var(--accent-muted);border:0.5px solid var(--border-light);border-radius:20px;padding:1px 6px;white-space:nowrap}
.rise-pill{display:inline-flex;align-items:center;gap:2px;background:var(--accent-50);color:var(--accent-600);border:0.5px solid var(--border);border-radius:20px;padding:3px 8px;font-size:11px;font-weight:500}
.tup{font-size:11px;font-weight:500;color:#be123c}
.tdn{font-size:11px;font-weight:500;color:#0369a1}
.tsm{font-size:11px;color:var(--muted)}
.tnew{display:inline-flex;align-items:center;gap:2px;background:#ecfdf5;color:#065f46;border:0.5px solid #6ee7b7;border-radius:20px;padding:2px 7px;font-size:10px;font-weight:500}
.chart-cell{width:220px}
.chart-wrap{width:100%;height:80px}
.no-data{font-size:11px;color:var(--muted)}
.empty-msg{text-align:center;padding:24px;color:var(--muted);font-size:12px}
.loading-msg{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.error-msg{text-align:center;padding:24px;color:#9a3412;font-size:12px;background:#fff7ed;border-radius:12px}
.hub-footer{text-align:center;margin-top:40px;font-size:11px;padding-top:20px;border-top:0.5px solid var(--border-light);font-family:'Noto Serif JP',serif;line-height:1.7;color:#c2a4bc}

@media(max-width:640px){
    .hub-wrap{padding:12px 8px 40px}
    .hub-title{font-size:17px}
    .site-tab{font-size:9px;padding:10px 1px}
    .stat-row{gap:5px}
    .stat-card{padding:8px 6px;gap:8px}
    .stat-value{font-size:18px}
    .stat-label{font-size:8px}
    .icon-3a{width:28px;height:28px}
    .icon-3a svg{width:14px;height:14px}
    table{display:block}
    thead{display:none}
    tbody{display:flex;flex-direction:column;gap:6px;padding:6px}
    tbody tr{display:grid;grid-template-columns:110px 1fr;background:#fff;border:0.5px solid var(--border);border-radius:10px;overflow:hidden;padding:0}
    tbody td{border-bottom:none;padding:0;width:auto !important}
    tbody tr:hover td{background:transparent}
    .thumb-wrap{grid-column:1;grid-row:1/4;width:110px !important;min-width:110px;padding:6px 4px 6px 6px;position:relative}
    .thumb-wrap img,.no-thumb{width:100px;height:75px;border-radius:6px}
    .thumb-rank{top:9px;left:9px}
    .title-cell{grid-column:2;grid-row:1;padding:6px 8px 2px 4px !important;display:block}
    .work-title{font-size:11px;white-space:normal;line-height:1.3}
    .chart-cell{grid-column:1/3;grid-row:4;width:100% !important}
    .chart-wrap{height:72px;padding:0 4px 6px;display:block}
    .section-title{font-size:13px}
    .section{margin-bottom:20px}
}
</style>
</head>
<body class="mode-3a">
<div class="hub-wrap">

<!-- アイコン切り替え -->
<div class="icon-switcher">
  <span>アイコン案：</span>
  <button class="active" onclick="setMode('3a')">3a（プラム円＋金）</button>
  <button onclick="setMode('3c')">3c（金ラインのみ）</button>
  <button onclick="setMode('none')">なし（現行）</button>
</div>

<div class="hub-card">
  <div class="hub-header">
    <div class="hub-gold-line"></div>
    <div class="hub-title">乙女向けシチュエーションボイス・ASMR作品<br>ランキング</div>
    <div class="hub-gold-line"></div>
    <div><div class="hub-update" id="hub-update">🔄 毎日更新 ／ ―</div></div>
  </div>
  <div class="hub-tabs-bar">
    <div class="site-tabs" id="site-tabs">
      <button class="site-tab active site-garu" data-site="garu">がるまに同人</button>
      <button class="site-tab site-garucomm" data-site="garucomm">がるまに商業</button>
      <button class="site-tab site-lovecul" data-site="lovecul">らぶカル</button>
      <button class="site-tab site-stella" data-site="stella">ステラプレイヤー</button>
      <button class="site-tab site-poke" data-site="poke">ポケドラ</button>
    </div>
  </div>
</div>

<div id="panels"></div>

<div class="hub-footer">
  各サイトのデータを直接取得して表示しています。<br>更新頻度は各サイトの仕様に準じます。
</div>
</div>

<script>
/* ---- SVGアイコン定義 ---- */
const ICONS = {
  works: {
    '3a': `<svg viewBox="0 0 24 24" fill="none" stroke="#e3c081" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="13" y2="16"/></svg>`,
    '3c': `<svg viewBox="0 0 24 24" fill="none" stroke="#c79a4a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="13" y2="16"/></svg>`,
  },
  new: {
    '3a': `<svg viewBox="0 0 24 24" fill="none" stroke="#e3c081" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/></svg>`,
    '3c': `<svg viewBox="0 0 24 24" fill="none" stroke="#c79a4a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/></svg>`,
  },
  rising: {
    '3a': `<svg viewBox="0 0 24 24" fill="none" stroke="#e3c081" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`,
    '3c': `<svg viewBox="0 0 24 24" fill="none" stroke="#c79a4a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`,
  },
  ranking: {
    '3a': `<svg viewBox="0 0 24 24" fill="none" stroke="#e3c081" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7z"/><path d="M5 20h14"/></svg>`,
    '3c': `<svg viewBox="0 0 24 24" fill="none" stroke="#c79a4a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7z"/><path d="M5 20h14"/></svg>`,
  },
  exclusive: {
    '3a': `<svg viewBox="0 0 24 24" fill="none" stroke="#e3c081" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.5 8.5 23 9.5 17.5 15 19 22 12 18.5 5 22 6.5 15 1 9.5 8.5 8.5 12 2"/></svg>`,
    '3c': `<svg viewBox="0 0 24 24" fill="none" stroke="#c79a4a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.5 8.5 23 9.5 17.5 15 19 22 12 18.5 5 22 6.5 15 1 9.5 8.5 8.5 12 2"/></svg>`,
  },
  preorder: {
    '3a': `<svg viewBox="0 0 24 24" fill="none" stroke="#e3c081" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    '3c': `<svg viewBox="0 0 24 24" fill="none" stroke="#c79a4a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  },
};

let currentMode = '3a';

function setMode(mode) {
  currentMode = mode;
  document.body.className = 'mode-' + mode;
  document.querySelectorAll('.icon-switcher button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  // パネルを再描画
  const activeTab = document.querySelector('.site-tab.active');
  if (activeTab) {
    const siteKey = activeTab.dataset.site;
    if (cache[siteKey]) renderAndMount(siteKey, cache[siteKey]);
  }
}

function sectionIconHtml(path) {
  const stroke = currentMode === '3a' ? '#e3c081' : '#c79a4a';
  if (currentMode === '3a') {
    return `<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--plum-dark);flex:none"><svg viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">${path}</svg></span>`;
  }
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;flex:none"><svg viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">${path}</svg></span>`;
}

function iconHtml(type) {
  const svg = ICONS[type]?.[currentMode] || '';
  if (!svg) return '';
  const cls = currentMode === '3a' ? 'icon-3a' : 'icon-3c';
  return `<span class="${cls}">${svg}</span>`;
}

const SOURCES = {
    garu:{url:"https://garumaninow.onrender.com/api/ranking",label:"DLsiteがるまに ランキング分析",accentClass:"site-garu",statLabels:["収録作品数","新着","急上昇作品"],statSubs:["2026年発売作品",null,"前日比10位以上上昇"],statIcons:["works","new","rising"]},
    stella:{url:"https://jikaseiorangette.github.io/stellaplayer-ranking/data/ranking.json",label:"ステラプレイヤー ランキング分析",accentClass:"site-stella",statLabels:["収録作品数","新着","近日配信予定"],statSubs:["2026年発売作品",null,"データあり・配信開始前"],statIcons:["works","new","preorder"]},
    poke:{url:"https://jikaseiorangette.github.io/pokedora-ranking/data/latest_adt.json",metaUrl:"https://jikaseiorangette.github.io/pokedora-ranking/data/meta_adt.json",graphUrl:"https://jikaseiorangette.github.io/pokedora-ranking/data/graph_adt.json",label:"ポケドラ ランキング分析",accentClass:"site-poke",statLabels:["収録作品数","新着","近日配信予定"],statSubs:["オトナ向け全作品",null,"配信開始前の作品"],statIcons:["works","new","preorder"]},
    garucomm:{url:"https://jikaseiorangette.github.io/garumani-ranking/data/latest.json",metaUrl:"https://jikaseiorangette.github.io/garumani-ranking/data/meta.json",graphUrl:"https://jikaseiorangette.github.io/garumani-ranking/data/graph.json",label:"がるまに商業 ランキング分析",accentClass:"site-garucomm",statLabels:["収録作品数","新着","がるまに独占"],statSubs:["2026年発売作品",null,"TOP10内の独占作品数"],statIcons:["works","new","exclusive"]},
    lovecul:{url:"https://jikaseiorangette.github.io/lovecul-ranking/data/latest.json",metaUrl:"https://jikaseiorangette.github.io/lovecul-ranking/data/meta.json",graphUrl:"https://jikaseiorangette.github.io/lovecul-ranking/data/graph.json",label:"らぶカル ランキング分析",accentClass:"site-lovecul",statLabels:["2026年発売作品","新着","急上昇/新着"],statSubs:["2026年発売作品数",null,"前日比10位以上上昇"],statIcons:["works","new","rising"]},
};

const cache = {};

function normalizeGaru(data) {
    const mapItem=(r,extra)=>({id:r.work_id,title:r.title,sub:r.voice_actor||"",url:r.affiliate_url||"#",img:r.thumb_url||"",tags:(r.genre||"").split(",").map(s=>s.trim()).filter(Boolean).slice(0,4),releaseDate:r.release_date||"",circle:r.circle||"",...extra});
    return {stats:[data.total_works??"—",data.new_today??"—",data.rising_count??"—"],ranking:(data.ranking||[]).map(r=>mapItem(r,{rank:r.rank,rankChange:r.is_new?null:(r.rank_change||0),isNew:!!r.is_new})),rising:(data.rising||[]).map(r=>mapItem(r,{rank:r.rank,rise:r.rise})),preorders:[],newTop3:(data.new_top3||[]).map(r=>mapItem(r,{rank:r.rank})),randomNew:(data.random_new||[]).map(r=>mapItem(r,{})),showNewTop3:!!data.show_new_top3,showRandomNew:!!data.show_random_new,graphData:data.graph_data||{},updated:data.today_str||""};
}
function normalizeStella(data) {
    const items=(data.categories&&data.categories.GIRLS)||[];
    const today=new Date(),fullLabels=[];
    for(let i=29;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);fullLabels.push(d.toISOString().slice(0,10));}

async function fetchJsonSafe(url){if(!url)return null;try{const r=await fetch(url,{mode:"cors"});if(!r.ok)return null;return await r.json();}catch(e){return null;}}
async function loadSite(k){
    if(cache[k]){renderAndMount(k,cache[k]);return;}
    showLoading(k);
    try{
        const res=await fetch(SOURCES[k].url,{mode:"cors"});
        if(!res.ok)throw new Error(`HTTP ${res.status}`);
        const raw=await res.json();
        const[meta,graphRaw]=await Promise.all([fetchJsonSafe(SOURCES[k].metaUrl),fetchJsonSafe(SOURCES[k].graphUrl)]);
        const norm=normalize(k,raw,meta,graphRaw);
        cache[k]=norm;renderAndMount(k,norm);
    }catch(err){showError(k,err);}
}

    wrapper.className=`site-panel active ${SOURCES[k].accentClass}`;
    wrapper.innerHTML=renderPanel(k,norm);
    panelsEl.innerHTML="";panelsEl.appendChild(wrapper);
    const accent=ACCENT_HEX[k];
    wrapper.querySelectorAll('canvas[data-id]').forEach(c=>drawChart(c.id,c.dataset.id,norm.graphData,accent));
}
tabsEl.addEventListener("click",e=>{
    const btn=e.target.closest(".site-tab");if(!btn)return;
    document.querySelectorAll(".site-tab").forEach(t=>t.classList.remove("active"));
    btn.classList.add("active");loadSite(btn.dataset.site);
});
loadSite("garu");
</script>
</body>
